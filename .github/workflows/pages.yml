name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'starlight/**'
      - 'vignette/**'
      - 'tools/htmlmd_to_zola.py'
      - 'justfile'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/

      - name: Install just
        uses: taiki-e/install-action@just

      # Regenerate site/content from the committed vignette/*.html.md and build.
      # python3 is preinstalled on ubuntu-latest runners.
      - name: Build site
        run: just site-build

      # Rustdoc for the dvs library, deps included ("complete picture"). The
      # dvs2 source is not vendored here, so clone it fresh and document it.
      # Pin the ref to a release tag to freeze the docs to a version.
      # cargo/rustup are preinstalled on ubuntu-latest.
      - name: Build rustdoc (dvs + dependencies)
        run: |
          git clone --depth 1 https://github.com/A2-ai/dvs2 dvs2-src
          cargo doc -p dvs --manifest-path dvs2-src/Cargo.toml
          mkdir -p site/public/rustdoc
          cp -r dvs2-src/target/doc/. site/public/rustdoc/

      # Starlight (Astro) reference site for the dvs R package, generated by
      # starlightr and committed under starlight/. Plain Astro project — builds
      # with the Node.js + npm preinstalled on the runner (no extra setup, no R
      # needed). Published under /r/, alongside the Zola site at the root.
      - name: Build Starlight R docs
        working-directory: starlight
        env:
          ASTRO_SITE: https://a2-ai.github.io
          ASTRO_BASE: /dvs2-docs/r/
        run: |
          npm install --no-audit --no-fund
          npm run build
          mkdir -p ../site/public/r
          cp -r dist/. ../site/public/r/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
