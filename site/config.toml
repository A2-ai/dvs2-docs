base_url = "https://a2-ai.github.io/dvs2-docs"
title = "dvs"
description = "Independent data version control for large or sensitive datasets, with or without Git."
compile_sass = true
build_search_index = true
generate_feeds = false

[search]
index_format = "elasticlunr_json"

[link_checker]
internal_level = "warn"

[markdown]
insert_anchor_links = "left"
smart_punctuation = false
lazy_async_image = true

[markdown.highlighting]
light_theme = "github-light"
dark_theme = "github-dark"

[extra]
repo_url = "https://github.com/A2-ai/dvs2"
